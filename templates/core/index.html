{% extends "base/base.html" %}

{% block title %}Inicio - IAGSA{% endblock %}

{% block content %}
<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0">Inicio</h1>
            </div>
        </div>
    </div>
</div>

<div class="content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header border-0">
                        <div class="d-flex justify-content-between">
                            <h3 class="card-title">Bienvenido a IAGSA</h3>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info" role="alert">
                            <h4 class="alert-heading">¡Hola Mundo!</h4>
                            <p>Bienvenido al sistema de gestión integrado IAGSA.</p>
                            <hr>
                            <p class="mb-0">Selecciona un módulo en el menú lateral para comenzar.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
